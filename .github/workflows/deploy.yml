name: Deploy Production

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build and push images
    runs-on: ubuntu-latest
    outputs:
      api_image: ${{ steps.images.outputs.api_image }}
      web_image: ${{ steps.images.outputs.web_image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image names
        id: images
        run: |
          REPOSITORY="$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')"
          API_IMAGE="${{ env.REGISTRY }}/${REPOSITORY}-api:${{ github.sha }}"
          WEB_IMAGE="${{ env.REGISTRY }}/${REPOSITORY}-web:${{ github.sha }}"
          echo "api_image=${API_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "web_image=${WEB_IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.images.outputs.api_image }}

      - name: Build and push Web
        uses: docker/build-push-action@v6
        with:
          context: frontend
          push: true
          build-args: |
            VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
            VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}
            VITE_API_BASE_URL=
          tags: ${{ steps.images.outputs.web_image }}

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy production compose file
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: docker-compose.prod.yml
          target: ${{ secrets.DEPLOY_PATH }}

      - name: Pull and restart services
        uses: appleboy/ssh-action@v1.2.0
        env:
          API_IMAGE: ${{ needs.build-and-push.outputs.api_image }}
          WEB_IMAGE: ${{ needs.build-and-push.outputs.web_image }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          GHCR_USER: ${{ github.actor }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          WEB_PORT: ${{ vars.WEB_PORT || '80' }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: API_IMAGE,WEB_IMAGE,GHCR_PAT,GHCR_USER,DEPLOY_PATH,WEB_PORT
          script: |
            set -e
            cd "$DEPLOY_PATH"
            test -f .env
            echo "$GHCR_PAT" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            API_IMAGE="$API_IMAGE" WEB_IMAGE="$WEB_IMAGE" WEB_PORT="$WEB_PORT" docker compose -f docker-compose.prod.yml pull
            API_IMAGE="$API_IMAGE" WEB_IMAGE="$WEB_IMAGE" WEB_PORT="$WEB_PORT" docker compose -f docker-compose.prod.yml up -d
            API_IMAGE="$API_IMAGE" WEB_IMAGE="$WEB_IMAGE" WEB_PORT="$WEB_PORT" docker compose -f docker-compose.prod.yml ps
